name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          # 🔥 Fire-themed gradient palette (fake glow effect)
          outputs: |
            dist/snake.svg?color_snake=#ff3b3b&color_dots=#1a0a0a,#ff4d00,#ff8c00,#ffd000,#ffffff
            dist/snake-dark.svg?color_snake=#ff4d00&color_dots=#0a0a0a,#ff3300,#ff6600,#ffcc00,#ffffff

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
